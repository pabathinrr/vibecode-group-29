<html>
<head>
<title>Student Profile Card</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

.card{
    width: 300px;
    background: white;
    margin: 50px auto;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.profile-img{
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background-color: #ccc;
    margin: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}

.name{
    font-size: 22px;
    font-weight: bold;
    margin-top: 15px;
}

.stream{
    color: gray;
    margin: 5px 0;
}

.bio{
    font-size: 14px;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="card">

<div class="profile-img">
Profile Image
</div>

<div class="name">
Arosha Indumina
</div>

<div class="stream">
Mathematics Stream
</div>

<div class="bio">
A/L student interested in Physics, Mathematics, and Technology. Planning to pursue engineering and IT in the future.
</div>

</div>

</body>
</html>
