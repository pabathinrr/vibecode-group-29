<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <style>
        /* CSS styling section */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .profile-card {
            background: white;
            width: 300px;
            padding: 30px;
            border-radius: 20px; /* Rounded corners */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); /* Shadow */
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            background-color: #e0e0e0;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #888;
            border: 4px solid #f0f0f0;
            overflow: hidden;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 {
            margin: 10px 0 5px;
            color: #333;
        }

        .stream {
            font-weight: bold;
            color: #764ba2;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .bio {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- <div> structure -->
    <div class="profile-card">
        <div class="profile-img">
            <img src="https://via.placeholder.com/150" alt="Profile Image">
        </div>
        <h2>Pabath Induwara</h2>
        <div class="stream">Information Systems</div>
        <p class="bio">
            Passionate about building scalable web applications and exploring the depths of Artificial Intelligence. Always learning, always coding.
        </p>
    </div>

</body>
</html>
